<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A website for finding restaurants, making reservations, and getting recommendations.">

    <meta name="author" content="David Clonan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../design/css/style.css">
    <script src="../design/js/jquery.min.js"></script>
    <script src="../design/js/script.js"></script>
    <title>Template</title>
</head>
<body>
    <header>
        <ul>
            <!-- <li>
                <img src="../design/images/logo.png" alt="Logo">
            </li> -->
            <li>
                <h1>Restaurant Finder</h1>
            </li>
        </ul>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="recommend.html">Recommendations</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="reservation.html">Reservations</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <form id="regform">
                <h2>Register</h2>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
                <label for="email">Email:</label>
                <input type="text" id="email" name="email">
                <label for="phonenumber">Phone Number:</label>
                <input type="tel" id="phonenumber" name="phonenumber">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
                <label for="passwordconfirm">Confirm Password:</label>
                <input type="password" id="passwordconfirm" name="passwordconfirm">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender">
                    <option value="">Select Gender</option>
                    <option value="male" id="genm">Male</option>
                    <option value="female" id="genf">Female</option>
                    <option value="other" id="geno">Other</option>
                </select>
                <label for="dietarypreferences">Dietary Preferences:</label>
                <input type="checkbox" id="vegetarian" name="dietarypreferences" value="vegetarian">
                <label for="vegetarian">Vegetarian</label>
                <input type="checkbox" id="vegan" name="dietarypreferences" value="vegan">
                <label for="vegan">Vegan</label>
                <input type="checkbox" id="glutenfree" name="dietarypreferences" value="glutenfree">
                <label for="glutenfree">Gluten Free</label>
                <input type="checkbox" id="lactosefree" name="dietarypreferences" value="lactosefree">
                <label for="lactosefree">Lactose Free</label>
                <input type="checkbox" id="halal" name="dietarypreferences" value="halal">
                <label for="halal">Halal</label>
                <br>
                <br>
                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer>
        <h3>&copy; 2026 David Clonan - 105915439</h3>
    </footer>
</body>
</html>
